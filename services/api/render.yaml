services:
  - type: web
    name: medgen-api
    runtime: python
    rootDir: services/api
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PORT
        value: 8000
      - key: FRONTEND_URL
        sync: false
      - key: KB_DIR
        value: ../../kb

